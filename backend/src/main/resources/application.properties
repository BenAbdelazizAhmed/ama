spring.application.name=amanafarm-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/amanafarm_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234AZERazer!}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=10

server.port=${PORT:8081}

app.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-before-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
app.base-url=${APP_BASE_URL:http://localhost:8081}
app.upload.dir=${UPLOAD_DIR:./uploads}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
