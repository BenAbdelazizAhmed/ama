spring.application.name=amanafarm-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/amanafarm_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=10

server.port=8081

app.jwt.secret=dev-only-change-this-secret-before-production-32chars-minimum
app.jwt.expiration-ms=604800000
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*
app.base-url=http://localhost:8081
app.upload.dir=./uploads
