      html:not(.app-ready) body {

      .app-boot {

        display: grid;
        place-items: center;
        background: #f4f8f5;
        color: #0d1f14;

        height: 54px;
        border-radius: 16px;
        background: #0f7a3c;
        box-shadow: 0 16px 38px rgba(15, 122, 60, .18);
      }

      html.app-ready .app-boot {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
